<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth</title>
  <meta name="description"
    content="Truth — Your AI-powered command center for email, sports intelligence, and deep analysis." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,450;14..32,500;14..32,600&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            alabaster: '#FAF9F6',
            sand: '#F4F3EF',
            clay: '#EAE8E1',
            charcoal: '#1A1A18',
            ink: '#0F0F0E',
            taupe: '#706E6B',
            bronze: '#8C7A6B',
            'warm-gold': '#B8A590',
            sage: '#929B87',
            emerald: '#34D399',
          },
          boxShadow: {
            'glass': '0 8px 32px rgba(140, 122, 107, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.6)',
            'glass-hover': '0 14px 48px rgba(140, 122, 107, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.8)',
            'glass-sm': '0 4px 16px rgba(140, 122, 107, 0.02), inset 0 1px 0 rgba(255, 255, 255, 0.5)',
            'btn': '0 2px 5px rgba(140, 122, 107, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.7)',
            'btn-hover': '0 4px 12px rgba(140, 122, 107, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9)',
            'btn-primary': '0 2px 6px rgba(140, 122, 107, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2)',
            'message': '0 1px 3px rgba(140, 122, 107, 0.04)',
          },
          animation: {
            'thinking-dot': 'thinkingDot 1.4s ease-in-out infinite',
            'breathe': 'breathe 4s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
          },
          keyframes: {
            thinkingDot: {
              '0%, 80%, 100%': { opacity: 0.3, transform: 'scale(0.8)' },
              '40%': { opacity: 1, transform: 'scale(1)' },..











              .
            },
            breathe: {
              '0%, 100%': { opacity: 0.15, transform: 'scale(1)' },
              '50%': { opacity: 0.35, transform: 'scale(1.05)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '200% center' },
              '100%': { backgroundPosition: '-200% center' },
            },
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #F4F3EF;
      color: #1A1A18;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    *:hover::-webkit-scrollbar-thumb {
      background: #EAE8E1;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #D1CFC7;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .prose pre {
      background-color: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Model message accent borders */
    .accent-border-operator {
      border-left: 2px solid rgba(140, 122, 107, 0.15);
      padding-left: 16px;
      transition: border-color 0.3s ease;
    }

    .accent-border-operator:hover {
      border-left-color: rgba(140, 122, 107, 0.35);
    }

    .accent-border-standard {
      border-left: 2px solid rgba(59, 130, 246, 0.15);
      padding-left: 16px;
      transition: border-color 0.3s ease;
    }

    .accent-border-standard:hover {
      border-left-color: rgba(59, 130, 246, 0.35);
    }

    /* Gradient focus border for input */
    .input-gradient-border {
      background: linear-gradient(135deg, #8C7A6B, #B8A590, #8C7A6B);
      background-size: 200% 200%;
      animation: shimmer 2s linear infinite;
      padding: 1.5px;
      border-radius: 1rem;
    }

    .input-gradient-border>div {
      background: white;
      border-radius: calc(1rem - 1.5px);
    }

    /* Suggestion chip hover */
    .suggestion-chip {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .suggestion-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(140, 122, 107, 0.1);
    }

    .suggestion-chip:active {
      transform: translateY(0) scale(0.98);
    }

    /* Thinking dots stagger */
    .thinking-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .thinking-dot:nth-child(2) {
      animation-delay: 0.16s;
    }

    .thinking-dot:nth-child(3) {
      animation-delay: 0.32s;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
