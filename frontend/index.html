<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Truth</title>
  <meta name="description"
    content="Truth — Your AI-powered command center for email, sports intelligence, and deep analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,450;14..32,500;14..32,600&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <script>
    window.process = { env: {} };
    window.global = window;
  </script>

  <style>
    body {
      background-color: #F4F3EF;
      color: #1A1A18;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    *:hover::-webkit-scrollbar-thumb {
      background: #EAE8E1;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #D1CFC7;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .prose pre {
      background-color: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Model message accent borders */
    .accent-border-operator {
      border-left: 2px solid rgba(140, 122, 107, 0.15);
      padding-left: 16px;
      transition: border-color 0.3s ease;
    }

    .accent-border-operator:hover {
      border-left-color: rgba(140, 122, 107, 0.35);
    }

    .accent-border-standard {
      border-left: 2px solid rgba(59, 130, 246, 0.15);
      padding-left: 16px;
      transition: border-color 0.3s ease;
    }

    .accent-border-standard:hover {
      border-left-color: rgba(59, 130, 246, 0.35);
    }

    /* Gradient focus border for input */
    .input-gradient-border {
      background: linear-gradient(135deg, #8C7A6B, #B8A590, #8C7A6B);
      background-size: 200% 200%;
      animation: shimmer 2s linear infinite;
      padding: 1.5px;
      border-radius: 1rem;
    }

    .input-gradient-border>div {
      background: white;
      border-radius: calc(1rem - 1.5px);
    }

    /* Suggestion chip hover */
    .suggestion-chip {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .suggestion-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(140, 122, 107, 0.1);
    }

    .suggestion-chip:active {
      transform: translateY(0) scale(0.98);
    }

    /* Thinking dots stagger */
    .thinking-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .thinking-dot:nth-child(2) {
      animation-delay: 0.16s;
    }

    .thinking-dot:nth-child(3) {
      animation-delay: 0.32s;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
